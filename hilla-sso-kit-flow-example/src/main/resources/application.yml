logging:
  level:
    root: info
    org:
      atmosphere: warn
server:
  port: 8080
  servlet:
    session:
      tracking-modes: cookie
spring:
  jpa:
    defer-datasource-initialization: true
  mustache:
    check-template-location: false
  security:
    oauth2:
      client:
        provider:
          keycloak: # This is the registration-id, can be any value
            issuer-uri: http://localhost:8081/realms/keycloak-realm
        registration:
          keycloak: # This should be the same as the registration-id
            client-id: keycloak-client
            client-secret: AZ29629NpntXmEoIFCEPrNlMIe4BlL5F
            scope:
              - profile
              - openid
              - email
              - roles
vaadin:
  launch-browser: true
  whitelisted-packages: com.vaadin,org.vaadin,dev.hilla,com.example.application
  sso:
    logout-redirect-route: http://localhost:8080/
    back-channel-logout: true